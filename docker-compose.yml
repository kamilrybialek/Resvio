version: '3.8'

services:

  # ── Resvio app ────────────────────────────────────────────────────────────
  resvio:
    build: .
    container_name: resvio
    ports:
      - "3000:3000"       # direct LAN access: http://192.168.1.249:3000
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # VERCEL must NOT be set here — that would disable Playwright scrapers
    volumes:
      - resvio_data:/app/data   # persists profile.json across rebuilds
    restart: unless-stopped
    shm_size: '256m'              # Chromium needs > 64 MB /dev/shm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/profile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  # Exposes app.yourdomain.com → resvio:3000 without opening any firewall ports.
  #
  # SETUP (one-time):
  #   1. Go to https://dash.cloudflare.com → Zero Trust → Networks → Tunnels
  #   2. Create a tunnel, name it "resvio-nas"
  #   3. Copy the tunnel token (starts with eyJ...)
  #   4. Add it to .env:  CLOUDFLARE_TUNNEL_TOKEN=eyJ...
  #   5. In Cloudflare Tunnel dashboard add a Public Hostname:
  #        Subdomain: app   Domain: resvio.online
  #        Service:   http://resvio:3000
  #
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: resvio-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      resvio:
        condition: service_healthy
    profiles:
      - tunnel   # only starts when COMPOSE_PROFILES=tunnel (see .env)

volumes:
  resvio_data:
    driver: local
