services:

  # ── Resvio app ────────────────────────────────────────────────────────────
  resvio:
    build: .
    container_name: resvio
    ports:
      - "3000:3000"       # direct LAN access: http://192.168.1.249:3000
    env_file:
      - path: .env
        required: false             # .env is optional — fall back to environment: block
      - path: .env.local
        required: false             # also load .env.local if present (dev keys)
    environment:
      - NODE_ENV=production
      # VERCEL must NOT be set here — that would disable Playwright scrapers
    volumes:
      - resvio_data:/app/data   # persists profile.json across rebuilds
    restart: unless-stopped
    shm_size: '256m'              # Chromium needs > 64 MB /dev/shm
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/profile',r=>process.exit(r.statusCode>=100&&r.statusCode<600?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  # Exposes app.resvio.online → resvio:3000 without opening any firewall ports.
  # Tunnel: resvio-nas (id: c9535677-a1ec-4f37-9674-38f47209d2dd)
  # Public Hostname configured via Cloudflare API — no manual dashboard steps needed.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: resvio-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiY2I2YTc5YzI2ZTg4NzkzNDA0YjBlMDNkNzEwYWVlYTgiLCJ0IjoiYzk1MzU2NzctYTFlYy00ZjM3LTk2NzQtMzhmNDcyMDlkMmRkIiwicyI6IlpUUTBPVE00WkRZdE16bGlOUzAwWkRkakxXSmhOV0V0TWpSaVlUUTRabVV5TkdWaiJ9
    depends_on:
      resvio:
        condition: service_healthy
    profiles:
      - tunnel   # only starts when COMPOSE_PROFILES=tunnel

volumes:
  resvio_data:
    driver: local
